<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1714;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#120f0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C84B31;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B87333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C84B31;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#C84B31;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="sandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:0.03" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Subtle desert sand at bottom -->
  <rect y="540" width="1200" height="90" fill="url(#sandGradient)"/>

  <!-- Decorative grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#F5E6D3" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#F5E6D3" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#F5E6D3" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#F5E6D3" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#F5E6D3" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#F5E6D3" stroke-width="1"/>
  </g>

  <!-- Accent bar at top -->
  <rect width="1200" height="4" fill="url(#accentGradient)"/>

  <!-- Logo symbol: cactus in a rounded square -->
  <g transform="translate(80, 130)">
    <rect width="100" height="100" rx="20" fill="url(#logoGradient)"/>
    <g transform="translate(50, 50)">
      <!-- Cactus body -->
      <rect x="-6" y="-28" width="12" height="50" rx="6" fill="#F5E6D3"/>
      <!-- Left arm -->
      <rect x="-22" y="-14" width="16" height="8" rx="4" fill="#F5E6D3"/>
      <rect x="-22" y="-14" width="8" height="20" rx="4" fill="#F5E6D3"/>
      <!-- Right arm -->
      <rect x="6" y="-6" width="16" height="8" rx="4" fill="#F5E6D3"/>
      <rect x="14" y="-6" width="8" height="16" rx="4" fill="#F5E6D3"/>
      <!-- Pot -->
      <path d="M -14,22 L 14,22 L 10,30 L -10,30 Z" fill="#F5E6D3" opacity="0.85"/>
    </g>
  </g>

  <!-- Main heading -->
  <text x="210" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="#F5E6D3" letter-spacing="-1">
    aptscout
  </text>

  <!-- Subtitle line 1 -->
  <text x="80" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#8B7D6B" letter-spacing="0">
    Apartment availability,
  </text>
  <!-- Subtitle line 2 -->
  <text x="80" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#8B7D6B" letter-spacing="0">
    one command.
  </text>

  <!-- Feature badges -->
  <g transform="translate(80, 340)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="170" height="40" rx="20" fill="#2d2520" stroke="#C84B31" stroke-width="1.5"/>
    <text x="85" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#C84B31" text-anchor="middle">
      14 Floor Plans
    </text>

    <!-- Badge 2 -->
    <rect x="185" y="0" width="160" height="40" rx="20" fill="#2d2520" stroke="#B87333" stroke-width="1.5"/>
    <text x="265" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#B87333" text-anchor="middle">
      Price Tracking
    </text>

    <!-- Badge 3 -->
    <rect x="0" y="55" width="170" height="40" rx="20" fill="#2d2520" stroke="#DAA520" stroke-width="1.5"/>
    <text x="85" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#DAA520" text-anchor="middle">
      SQLite Storage
    </text>

    <!-- Badge 4 -->
    <rect x="185" y="55" width="160" height="40" rx="20" fill="#2d2520" stroke="#8B7D6B" stroke-width="1.5"/>
    <text x="265" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="600" fill="#8B7D6B" text-anchor="middle">
      Web UI
    </text>
  </g>

  <!-- Terminal snippet -->
  <g transform="translate(700, 140)">
    <rect width="400" height="300" rx="12" fill="#120f0d" stroke="#2d2520" stroke-width="2"/>

    <!-- Terminal header -->
    <rect width="400" height="40" rx="12" fill="#2d2520"/>
    <circle cx="20" cy="20" r="5" fill="#C84B31" opacity="0.8"/>
    <circle cx="40" cy="20" r="5" fill="#DAA520" opacity="0.8"/>
    <circle cx="60" cy="20" r="5" fill="#B87333" opacity="0.8"/>

    <!-- Terminal content -->
    <text x="20" y="75" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#C84B31" font-weight="500">$ aptscout scrape</text>
    <text x="20" y="100" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#8B7D6B">→ Found 14 floor plans</text>
    <text x="20" y="122" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#8B7D6B">→ Scraping A1R, B2R, C1R...</text>
    <text x="20" y="144" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#B87333">✓ 24 units available</text>

    <text x="20" y="180" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="15" fill="#C84B31" font-weight="500">$ aptscout list --beds 2</text>
    <text x="20" y="205" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#8B7D6B">#3169  B2R  2bd/2ba</text>
    <text x="268" y="205" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#DAA520">$2,010</text>
    <text x="20" y="227" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#8B7D6B">#2146  B2R  2bd/2ba</text>
    <text x="268" y="227" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#DAA520">$2,095</text>
    <text x="20" y="249" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#8B7D6B">#3213  B3R  2bd/2ba</text>
    <text x="268" y="249" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#DAA520">$2,220</text>

    <text x="20" y="280" font-family="'SF Mono', Monaco, 'Courier New', monospace"
          font-size="13" fill="#5c5248">8 apartments found.</text>
  </g>

  <!-- Decorative desert background elements -->
  <g opacity="0.04">
    <!-- Distant cactus silhouettes -->
    <rect x="950" y="490" width="8" height="60" rx="4" fill="#B87333"/>
    <rect x="940" y="510" width="18" height="6" rx="3" fill="#B87333"/>
    <rect x="940" y="510" width="6" height="18" rx="3" fill="#B87333"/>
    <rect x="1050" y="500" width="6" height="40" rx="3" fill="#B87333"/>
    <rect x="1045" y="515" width="16" height="5" rx="2.5" fill="#B87333"/>
    <rect x="1055" y="508" width="12" height="5" rx="2.5" fill="#B87333"/>
    <rect x="1061" y="508" width="5" height="14" rx="2.5" fill="#B87333"/>
    <rect x="150" y="510" width="6" height="35" rx="3" fill="#B87333"/>
    <rect x="145" y="520" width="14" height="5" rx="2.5" fill="#B87333"/>
  </g>

  <!-- Bottom accent -->
  <rect y="626" width="1200" height="4" fill="url(#accentGradient)"/>
</svg>
